name: Auto-merge

# Auto-enables squash-merge on every PR targeting main once CI passes.
# Mirrors the global Capital Thought policy (per Josh's CLAUDE.md "Git & PRs"
# § auto-merge GHA workflow). Drafts are skipped — converting to ready-for-review
# triggers the auto-merge enable.

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-automerge:
    if: github.event.pull_request.base.ref == github.event.repository.default_branch && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Enable squash auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge --squash --auto "${{ github.event.pull_request.number }}" --repo "${{ github.repository }}"
